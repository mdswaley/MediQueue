<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MediQueue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🏥 MediQueue
        </span>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- Appointment Form -->

        <div class="col-lg-4">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    Add Appointment
                </div>

                <div class="card-body">

                    <form id="appointmentForm">

                        <div class="mb-3">
                            <label>Patient Name</label>
                            <input
                                    type="text"
                                    id="patientName"
                                    class="form-control"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label>Age</label>
                            <input
                                    type="number"
                                    id="age"
                                    class="form-control"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label>Mobile Number</label>
                            <input
                                    type="text"
                                    id="mobileNumber"
                                    class="form-control"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input
                                    type="email"
                                    id="email"
                                    class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Appointment Date</label>
                            <input
                                    type="date"
                                    id="appointmentDate"
                                    class="form-control"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label>Doctor</label>

                            <select
                                    id="doctorOptions"
                                    class="form-select">

                                <option>DR_SHARMA</option>
                                <option>DR_DAS</option>
                                <option>DR_MOHANTY</option>

                            </select>

                        </div>

                        <button class="btn btn-success w-100">
                            Book Appointment
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Appointment List -->

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    Today's Appointments

                </div>

                <div class="card-body">

                    <table class="table table-bordered">

                        <thead>

                        <tr>

                            <th>Token</th>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Time</th>
                            <th>Delete</th>

                        </tr>

                        </thead>

                        <tbody id="appointmentTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/app.js"></script>

</body>
</html>
